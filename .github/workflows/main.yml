name: Chuck Norris Automation

on:
  schedule:
    # Roda a cada hora (no minuto 0)
    - cron: '*/5 * * * *'
  # Permite rodar manualmente pelo botão no GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests gspread oauth2client python-dotenv

      - name: Executar Script
        env:
          # Aqui conectamos o seu Secret com o código Python
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python main.py
